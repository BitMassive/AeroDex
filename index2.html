<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Hudson Corridor Watch</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700&family=Space+Mono:wght@400;700&display=swap');

  :root{
    --bg:#090f0c;
    --scope:#0d1811;
    --grid:#20392c;
    --phosphor:#8fe3a6;
    --phosphor-dim:#4d7a5e;
    --amber:#ffc670;
    --magenta:#ff6fa5;
    --muted:#6b8577;
    --hair:#1a2b21;
    --cat-ga:#ffc670;         /* amber */
    --cat-charter:#b98eff;    /* violet */
    --cat-rotor:#5eead4;      /* teal */
    --cat-commercial:#8fe3a6; /* phosphor green */
    --hardmode:#ff5533; /* hard mode accent — distinct from magenta (used for "first catch"/new) */
  }
  *{box-sizing:border-box;}
  html{overflow-x:hidden;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--phosphor);
    font-family:'Space Mono', monospace;
    min-height:100vh;
    overflow-x:hidden;
  }
  header{
    padding:10px 20px 10px;
    border-bottom:1px solid var(--hair);
  }
  h1{
    font-family:'Barlow Condensed', sans-serif;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.06em;
    font-size:clamp(22px,4vw,32px);
    margin:0 0 2px;
    color:#eafff0;
  }
  .sub{
    color:var(--muted);
    font-size:12px;
    letter-spacing:.04em;
  }
  .coords{color:var(--amber);}

  .tabs{
    display:flex;
    flex-wrap:wrap;
    gap:2px;
  }
  .btn-pair{display:flex;gap:4px;}
  .app-brand{
    font-family:'Barlow Condensed',sans-serif;
    text-transform:uppercase;
    letter-spacing:.05em;
    font-weight:700;
    font-size:20px;
    color:#eafff0;
    display:flex;
    align-items:center;
    padding:7px 14px 7px 0;
  }
  .geo-accuracy{
    margin-left:auto;
    font-family:'Space Mono',monospace;
    font-size:11px;
    color:var(--amber);
    align-self:center;
    padding-right:8px;
  }
  .tab{
    font-family:'Barlow Condensed',sans-serif;
    text-transform:uppercase;
    letter-spacing:.05em;
    font-weight:700;
    font-size:13px;
    padding:7px 14px;
    background:transparent;
    border:1px solid var(--hair);
    color:var(--muted);
    cursor:pointer;
  }
  .tab.active{color:var(--phosphor);background:var(--scope);border-color:var(--grid);}

  main{
    padding:16px 20px 56px;
    max-width:1100px;
    margin:0 auto;
  }
  .status{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
    font-size:11px;
    color:var(--muted);
    margin-bottom:10px;
  }
  .status b{color:var(--phosphor);}
  .controls{display:flex;gap:14px;align-items:center;flex-wrap:wrap;flex:1;min-width:0;}
  .controls label{font-size:11px;color:var(--muted);display:flex;gap:6px;align-items:center;}
  select, input[type=number]{
    background:var(--scope);
    color:var(--phosphor);
    border:1px solid var(--grid);
    font-family:'Space Mono',monospace;
    font-size:12px;
    padding:6px 8px;
    border-radius:0;
    appearance:none;
    -webkit-appearance:none;
    -moz-appearance:none;
    cursor:pointer;
  }
  select{
    background-image:linear-gradient(45deg, transparent 50%, var(--muted) 50%), linear-gradient(135deg, var(--muted) 50%, transparent 50%);
    background-position:calc(100% - 14px) center, calc(100% - 9px) center;
    background-size:5px 5px, 5px 5px;
    background-repeat:no-repeat;
    padding-right:26px;
  }
  select:focus{outline:none;border-color:var(--phosphor);}
  .toggle{
    display:inline-flex;
    border:1px solid var(--grid);
    cursor:pointer;
    user-select:none;
  }
  .toggle span{padding:4px 10px;font-size:11px;color:var(--muted);}
  .toggle span.on{background:var(--phosphor-dim);color:#eafff0;}
  .geo-btn{
    font-family:'Space Mono',monospace;
    font-size:11px;
    padding:8px 12px;
    background:transparent;
    border:1px solid var(--grid);
    color:var(--muted);
    cursor:pointer;
  }
  .geo-btn.on{background:var(--phosphor-dim);color:#eafff0;border-color:var(--phosphor);}
  .icon-btn{padding:8px 10px;font-size:16px;line-height:1;display:inline-flex;align-items:center;justify-content:center;}
  .icon-btn i{font-style:normal;}

  .collection-filters{display:flex;gap:8px;margin-bottom:10px;}
  .collection-filters select{flex:1;}

  .collection-toolbar{
    display:flex;
    justify-content:space-between;
    align-items:stretch;
    gap:8px;
    margin-bottom:12px;
  }
  .collection-toolbar > *{flex:1;} /* every column + button shares the row evenly */
  .rarity-count-col{
    display:flex;align-items:center;justify-content:center;gap:6px;
    font-family:'Space Mono',monospace;font-size:14px;font-weight:700;
    color:var(--muted);
    border:1px solid transparent; /* reserved so activating doesn't shift layout */
    padding:4px 6px;
    background:transparent;
    cursor:pointer;
  }
  .rarity-count-col.active{background:var(--phosphor-dim);border-color:var(--phosphor);}
  .rarity-count-col i{font-style:normal;font-size:24px;line-height:1;}
  .rarity-count-dot{width:14px;height:14px;border-radius:50%;background:var(--muted);display:inline-block;}
  .filter-checks{display:flex;flex-wrap:nowrap;gap:6px;align-items:center;justify-content:space-between;width:100%;}
  .filter-checks label{
    display:flex;align-items:center;gap:4px;
    font-size:11px;color:var(--muted);
    cursor:pointer;user-select:none;
    white-space:nowrap;
    padding:4px 0; /* taller tap target without changing visual spacing much */
  }
  .filter-checks input[type=checkbox]{accent-color:var(--phosphor);cursor:pointer;width:14px;height:14px;flex-shrink:0;}
  .filter-count{opacity:0.5;font-family:'Space Mono',monospace;}

  .layout{
    display:grid;
    grid-template-columns:minmax(280px,420px) 1fr;
    gap:20px;
  }
  .layout > *{min-width:0;} /* stop a child's intrinsic min-width (e.g. the scrollable table) from stretching the grid track */
  @media (max-width:760px){ .layout{grid-template-columns:1fr;} }

  .scope-wrap{
    background:var(--scope);
    border:1px solid var(--grid);
    padding:10px;
    transition:border-color 0.2s;
  }
  .scope-wrap.hard-mode-active{
    border:2px solid var(--hardmode);
    padding:9px;
    box-shadow:0 0 12px rgba(255,85,51,0.35);
  }
  .aim-gate{border:1px solid var(--hardmode);padding:12px;margin-top:10px;}
  .aim-viewfinder-wrap{
    position:relative;width:100%;height:220px;overflow:hidden;
    margin-bottom:10px;background:#000;border:2px solid var(--hardmode);
    transition:border-color 0.2s;
  }
  .aim-viewfinder-wrap.aligned{border-color:var(--phosphor);}
  .aim-viewfinder{width:100%;height:100%;object-fit:cover;display:block;}
  .aim-reticle{
    position:absolute;top:50%;left:50%;width:44px;height:44px;
    transform:translate(-50%,-50%);
    border:2px solid rgba(255,255,255,0.55);border-radius:50%;
    pointer-events:none;
  }
  .aim-reticle::before, .aim-reticle::after{
    content:'';position:absolute;background:rgba(255,255,255,0.55);
  }
  .aim-reticle::before{top:50%;left:-10px;right:-10px;height:1px;transform:translateY(-50%);}
  .aim-reticle::after{left:50%;top:-10px;bottom:-10px;width:1px;transform:translateX(-50%);}
  .aim-overlay-top{
    position:absolute;top:0;left:0;right:0;padding:8px 10px;
    background:linear-gradient(to bottom, rgba(0,0,0,0.75), transparent);
    color:var(--hardmode);font-family:'Barlow Condensed',sans-serif;
    text-transform:uppercase;letter-spacing:.04em;font-weight:700;font-size:13px;
    display:flex;align-items:center;gap:6px;
  }
  .aim-overlay-bottom{
    position:absolute;bottom:0;left:0;right:0;padding:8px;
    background:linear-gradient(to top, rgba(0,0,0,0.85), transparent);
  }
  .aim-overlay-bottom .aim-readout{margin-bottom:6px;}
  .aim-overlay-bottom .aim-readout div{background:rgba(0,0,0,0.55);border-color:rgba(255,255,255,0.2);}
  .aim-overlay-bottom .aim-status{margin-bottom:0;}
  .aim-readout{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:11px;margin-bottom:10px;}
  .aim-readout div{background:var(--bg);border:1px solid var(--grid);padding:6px 8px;}
  .aim-readout .aim-label{color:var(--muted);display:block;font-size:9px;text-transform:uppercase;margin-bottom:2px;}
  .aim-readout .aim-value{font-family:'Space Mono',monospace;font-size:14px;}
  .aim-status{font-size:11px;margin-bottom:10px;padding:6px 8px;text-align:center;border:1px solid var(--grid);}
  .aim-status.aligned{
    color:#04140a;
    background:var(--phosphor);
    border-color:var(--phosphor);
    font-weight:700;
    font-size:13px;
    padding:10px 8px;
    text-transform:uppercase;
    letter-spacing:.03em;
  }
  .aim-status.unaligned{color:var(--amber);}
  .aim-identify-btn{width:100%;font-size:13px;transition:all 0.15s;}
  .aim-identify-btn:disabled{opacity:0.35;cursor:not-allowed;}
  .aim-identify-btn:not(:disabled){
    background:var(--phosphor);
    color:#04140a;
    border-color:var(--phosphor);
    font-weight:700;
    animation:aim-ready-pulse 1.1s ease-in-out infinite;
  }
  @keyframes aim-ready-pulse{
    0%,100%{box-shadow:0 0 8px rgba(143,227,166,0.5);}
    50%{box-shadow:0 0 20px rgba(143,227,166,0.95);}
  }
  .aim-captured-photo{width:100%;max-height:160px;object-fit:cover;border:1px solid var(--grid);display:block;margin-bottom:10px;}
  .aim-skip{display:block;text-align:center;font-size:10px;color:var(--muted);margin-top:8px;text-decoration:underline;cursor:pointer;}
  .feed-warning{
    color:var(--magenta);
    font-size:11px;
    padding:6px 8px;
    margin-bottom:8px;
    border:1px solid var(--magenta);
    background:rgba(255,111,165,0.08);
  }
  .section-heading{
    font-family:'Barlow Condensed',sans-serif;
    text-transform:uppercase;
    letter-spacing:.05em;
    font-weight:700;
    font-size:20px;
    color:#eafff0;
    margin:28px 0 14px;
    padding-top:16px;
    border-top:1px solid var(--hair);
  }
  .scope-status{font-size:11px;color:var(--muted);margin-bottom:8px;}
  .scope-status b{color:var(--phosphor);}
  #scope{width:100%;aspect-ratio:1/1;background:var(--scope);}
  .leaflet-container{background:var(--scope);font-family:'Space Mono',monospace;}
  .leaflet-control-attribution{background:rgba(9,15,12,0.7) !important;color:var(--muted) !important;font-size:9px !important;}
  .leaflet-control-attribution a{color:var(--muted) !important;}
  .center-pin{width:10px;height:10px;border-radius:50%;background:#eafff0;border:2px solid var(--bg);box-shadow:0 0 0 1px #eafff0;}
  .alt-label{
    background:transparent;
    color:#eafff0;
    font-family:'Space Mono',monospace;
    font-size:10px;
    font-weight:700;
    text-shadow:0 0 2px #000, 0 0 2px #000, 0 0 4px #000;
    white-space:nowrap;
    pointer-events:none;
  }
  .airport-marker{pointer-events:none;}
  .rarity-marker{pointer-events:none;display:flex;align-items:center;justify-content:center;}
  .rarity-icon{
    font-style:normal;line-height:1;
    text-shadow:0 0 3px rgba(0,0,0,0.9),0 0 6px rgba(0,0,0,0.6);
  }
  .ap-dot{width:9px;height:9px;border:1.5px solid #7dc4ff;background:rgba(125,196,255,0.15);transform:rotate(45deg);opacity:0.5;}
  .ap-dot.heli{border-radius:50%;transform:none;}
  .ap-dot.other{border-radius:2px;transform:none;width:8px;height:8px;}
  .ap-label{
    position:absolute;left:13px;top:-4px;
    font-family:'Space Mono',monospace;font-size:10px;font-weight:700;
    color:#7dc4ff;text-shadow:0 0 2px #000,0 0 2px #000,0 0 4px #000;white-space:nowrap;
    opacity:0.5;
  }
  .leaflet-tooltip{background:var(--scope) !important;color:var(--phosphor) !important;border:1px solid var(--grid) !important;font-family:'Space Mono',monospace !important;font-size:11px !important;}
  .leaflet-popup-content-wrapper{background:var(--scope) !important;color:var(--phosphor) !important;border:1px solid var(--grid) !important;border-radius:0 !important;}
  .leaflet-popup-content{font-family:'Space Mono',monospace !important;font-size:12px !important;margin:10px 12px !important;}
  .leaflet-popup-content b{color:#eafff0;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.03em;}
  .leaflet-popup-tip{background:var(--scope) !important;border:1px solid var(--grid) !important;}
  .leaflet-popup-close-button{color:var(--muted) !important;}

  .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  table{width:100%;border-collapse:collapse;font-size:12px;min-width:520px;}
  .collection-table-wrap{width:100%;}
  table.collection-table{
    min-width:0;
    table-layout:fixed;
  }
  table.collection-table th, table.collection-table td{
    white-space:normal;
    word-break:break-word;
    overflow-wrap:break-word;
  }
  table.collection-table th:nth-child(1), table.collection-table td:nth-child(1){width:6%;}
  table.collection-table th:nth-child(2), table.collection-table td:nth-child(2){width:23%;}
  table.collection-table th:nth-child(3), table.collection-table td:nth-child(3){width:39%;}
  table.collection-table th:nth-child(4), table.collection-table td:nth-child(4){width:14%;}
  table.collection-table th:nth-child(5), table.collection-table td:nth-child(5){width:18%;}
  thead th{
    text-align:left;
    font-family:'Barlow Condensed',sans-serif;
    text-transform:uppercase;
    letter-spacing:.04em;
    font-weight:700;
    color:var(--muted);
    border-bottom:1px solid var(--grid);
    padding:6px 8px;
    font-size:11px;
  }
  tbody td{padding:7px 8px;border-bottom:1px solid var(--hair);}
  tbody tr{cursor:pointer;}
  tbody tr:hover{background:var(--scope);}
  tbody tr.new td:first-child{color:var(--magenta);}
  tbody tr.selected{background:rgba(143,227,166,0.08);}
  tbody tr.selected td:first-child{color:#eafff0;font-weight:bold;}
  tbody tr.repeat-catch{background:rgba(143,227,166,0.07);}
  tbody tr.dimmed{opacity:0.35;}
  .model{font-size:10px;color:var(--muted);margin-top:1px;}
  .tap-to-id{color:var(--amber);text-decoration:underline;text-underline-offset:2px;cursor:pointer;}
  .badge{
    display:inline-block;
    font-size:10px;
    padding:1px 6px;
    border:1px solid var(--grid);
    color:var(--muted);
  }
  .badge.ga{color:var(--amber);border-color:var(--amber);}
  .empty{color:var(--muted);padding:20px 8px;font-size:12px;}

  .rarity-badge{
    display:inline-block;font-size:10px;padding:1px 6px;border:1px solid;
    font-weight:700;text-transform:uppercase;letter-spacing:.03em;
    font-family:'Barlow Condensed',sans-serif;
  }
  .legendary-text{
    background:linear-gradient(90deg,#ffd700,#ff6fa5,#7dc4ff,#b968ff,#ffd700);
    background-size:300% 100%;
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;color:transparent;
    animation:legendary-shine 3s linear infinite;
  }
  @keyframes legendary-shine{
    0%{background-position:0% 50%;}
    100%{background-position:300% 50%;}
  }

  .modal-backdrop{
    display:none;
    position:fixed; inset:0;
    background:rgba(5,10,7,0.72);
    z-index:999;
  }
  .modal-backdrop.show{display:block;}
  .detail{
    display:none;
    position:fixed;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    z-index:1000;
    width:min(420px, 90vw);
    max-height:82vh;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    border:1px solid var(--grid);
    background:var(--scope);
    padding:16px 18px;
    font-size:12px;
    box-shadow:0 12px 48px rgba(0,0,0,0.65);
  }
  .detail.show{display:block;}
  .detail.camera-active{
    width:min(560px, 96vw);
    max-height:94vh;
  }
  .detail.camera-active .aim-viewfinder-wrap{height:min(60vh, 480px);}
  .detail.camera-active #detailBody{display:none;}
  .detail-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;}
  .detail-head-title{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .detail-photo{width:100%;height:140px;object-fit:cover;border:1px solid var(--grid);background:var(--bg);display:block;margin-bottom:12px;}
  .detail-photo-wrap{position:relative;margin-bottom:12px;}
  .detail-photo-wrap .detail-photo{margin-bottom:0;}
  .detail-photo-missing{
    height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
    border:1px dashed var(--grid);color:var(--muted);font-size:10px;margin-bottom:12px;
    text-decoration:none;cursor:pointer;
  }
  .detail-photo-missing:hover{border-color:var(--amber);color:var(--amber);}
  .detail-close{
    background:transparent;border:1px solid var(--grid);color:var(--muted);
    font-size:16px;line-height:1;padding:4px 8px;cursor:pointer;flex-shrink:0;
  }
  .detail-close:hover{border-color:var(--phosphor);color:var(--phosphor);}
  .detail h3{
    font-family:'Barlow Condensed',sans-serif;
    margin:0;
    font-size:18px;
    color:#eafff0;
    text-transform:uppercase;
  }
  .detail dl{display:grid;grid-template-columns:auto 1fr;gap:4px 12px;margin:0;}
  .detail dt{color:var(--muted);}
  .detail dd{margin:0;}
  .type-edit-toggle{
    display:block;font-size:10px;color:var(--amber);text-decoration:underline;
    cursor:pointer;margin:10px 0 0;
  }
  .type-edit-form{
    margin-top:8px;padding:10px;border:1px solid var(--grid);background:var(--bg);
    display:flex;flex-direction:column;gap:8px;
  }
  .type-edit-label{
    display:flex;flex-direction:column;gap:3px;font-size:10px;color:var(--muted);
    text-transform:uppercase;letter-spacing:.03em;
  }
  .type-edit-scope{
    text-transform:none;letter-spacing:normal;font-weight:400;
    color:var(--muted);opacity:0.7;font-size:9px;
  }
  .type-edit-label select, .type-edit-label input{width:100%;}
  .type-edit-actions{display:flex;gap:8px;margin-top:4px;}
  .type-edit-actions .geo-btn{flex:1;font-size:10px;padding:8px;}
  .quiz-area{margin-top:12px;}
  .quiz-area:empty{margin-top:0;}
  .quiz-prompt{
    font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.04em;
    font-size:13px;color:var(--amber);margin-bottom:8px;
  }
  .quiz-opt{
    display:block;width:100%;text-align:left;
    background:var(--bg);border:1px solid var(--grid);color:var(--phosphor);
    font-family:'Space Mono',monospace;font-size:12px;
    padding:8px 10px;margin-bottom:6px;cursor:pointer;
  }
  .quiz-opt:hover{border-color:var(--phosphor);}
  .quiz-opt:active{background:var(--phosphor-dim);}
  .quiz-result{font-size:13px;padding:8px 10px;border:1px solid var(--grid);}
  .quiz-result.correct{color:var(--phosphor);border-color:var(--phosphor);}
  .quiz-result.partial{color:var(--amber);border-color:var(--amber);}
  .quiz-result.wrong{color:var(--magenta);border-color:var(--magenta);}
  .photo-hint-note{
    font-size:10px;color:var(--amber);margin-top:6px;padding:6px 8px;
    border:1px solid var(--amber);background:rgba(255,196,112,0.08);
  }
  .photo-compare-loading{font-size:10px;color:var(--muted);margin-top:10px;}
  .photo-compare{display:flex;gap:10px;margin-top:10px;}
  .photo-compare-col{flex:1;text-align:center;min-width:0;}
  .photo-compare-col img{width:100%;height:90px;object-fit:cover;border:1px solid var(--grid);background:var(--bg);display:block;}
  .photo-img-wrap{position:relative;}
  .photo-overlay-badge{
    position:absolute; left:0; right:0; bottom:0;
    background:rgba(0,0,0,0.78);
    color:var(--amber);
    font-size:8px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.03em;
    text-align:center;
    padding:3px 2px;
  }
  .photo-missing{
    height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
    border:1px dashed var(--grid);color:var(--muted);font-size:9px;padding:0 6px;text-align:center;
    text-decoration:none;cursor:pointer;
  }
  .photo-missing:hover{border-color:var(--amber);color:var(--amber);}
  .photo-missing-link{font-size:9px;color:var(--amber);text-decoration:underline;}
  .photo-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}
  .photo-caption{font-size:10px;color:var(--phosphor);margin-top:4px;white-space:normal;overflow-wrap:break-word;}
  .photo-credit{font-size:8px;color:var(--muted);opacity:0.7;margin-top:2px;}
  .photo-fallback-link{display:block;text-align:center;font-size:10px;color:var(--amber);margin-top:10px;text-decoration:underline;}

  .logbook-empty{color:var(--muted);font-size:12px;padding:20px 0;}

  .dash-stats-primary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
  .dash-stat-lg{background:var(--scope);border:1px solid var(--grid);padding:18px 8px;text-align:center;}
  .dash-stat-lg b{display:block;font-size:34px;color:#eafff0;font-family:'Barlow Condensed',sans-serif;line-height:1;}
  .dash-stat-lg span{display:block;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:4px;}

  .dash-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;}
  .dash-stat{
    background:var(--scope);border:1px solid var(--grid);padding:10px 6px;text-align:center;
  }
  .dash-stat b{display:block;font-size:20px;color:#eafff0;font-family:'Barlow Condensed',sans-serif;}
  .dash-stat span{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:2px;}

  .dash-section{margin-bottom:24px;}
  .dash-section h4{
    font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.04em;
    font-size:15px;color:#eafff0;margin:0 0 10px;font-weight:700;
  }
  .dash-trend-label{color:var(--amber);font-size:11px;text-transform:none;letter-spacing:normal;font-weight:400;margin-left:8px;}
  .dash-trend-svg{width:100%;height:120px;background:var(--scope);border:1px solid var(--grid);display:block;}
  .dash-trend-caption{font-size:10px;color:var(--muted);margin-top:6px;line-height:1.5;}

  .dash-cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .dash-cat-col{text-align:center;background:var(--scope);border:1px solid var(--grid);padding:12px 4px;}
  .dash-cat-name{
    font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.03em;
    font-weight:700;font-size:12px;margin-bottom:4px;
  }
  .dash-cat-pct{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:24px;line-height:1;}
  .dash-cat-count{font-size:10px;color:var(--muted);margin-top:4px;}
  @media (max-width:480px){ .dash-cat-grid{grid-template-columns:repeat(2,1fr);} .dash-cat-col:nth-child(n+3){margin-top:8px;} }

  .dash-bar-row{display:grid;grid-template-columns:1fr 2fr auto;gap:10px;align-items:center;margin-bottom:8px;font-size:12px;}
  .dash-bar-label{color:var(--phosphor);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .dash-bar-count{color:var(--muted);}
  .dash-bar-track{background:var(--scope);border:1px solid var(--grid);height:14px;}
  .dash-bar-fill{height:100%;}
  .dash-bar-pct{text-align:right;min-width:36px;font-weight:700;}

  .dash-recent{width:100%;border-collapse:collapse;font-size:11px;}
  .dash-recent th{text-align:left;color:var(--muted);border-bottom:1px solid var(--grid);padding:5px 6px;font-weight:400;}
  .dash-recent td{padding:5px 6px;border-bottom:1px solid var(--hair);}
  footer{
    position:fixed;
    left:0; right:0; bottom:0;
    background:var(--bg);
    border-top:1px solid var(--hair);
    color:var(--muted);
    font-size:10px;
    text-align:center;
    padding:10px;
    z-index:900; /* under the detail/modal layers (999-1000) but above page content */
  }
  a{color:var(--amber);}
</style>
</head>
<body>

<header>
  <div class="tabs">
    <span class="app-brand">AeroDex</span>
    <span class="geo-accuracy" id="geoAccuracy"></span>
    <div class="btn-pair">
      <button id="hardModeBtn" class="geo-btn icon-btn" title="Hard Mode — point your phone at the aircraft to identify it" aria-label="Toggle Hard Mode"><i class="ph">&#xEA64;</i></button>
      <button id="photoHintsBtn" class="geo-btn icon-btn" title="Photo hints — see a picture before you guess (handy indoors, or when the plane's too far to see)" aria-label="Toggle photo hints"><i class="ph">&#xE10E;</i></button>
      <button id="geoBtn" class="geo-btn icon-btn" title="Use my location" aria-label="Use my location"><i class="ph">&#xEDD8;</i></button>
    </div>
  </div>
</header>

<main>

  <div class="status">
    <div class="controls">
      <div class="filter-checks" id="catFilters">
        <label style="color:var(--cat-ga);"><input type="checkbox" data-cat="ga" checked style="accent-color:var(--cat-ga);"> GA <span class="filter-count" id="filterCountGa">0</span></label>
        <label style="color:var(--cat-rotor);"><input type="checkbox" data-cat="rotor" checked style="accent-color:var(--cat-rotor);"> Rotor <span class="filter-count" id="filterCountRotor">0</span></label>
        <label style="color:var(--cat-charter);"><input type="checkbox" data-cat="charter" checked style="accent-color:var(--cat-charter);"> Charter <span class="filter-count" id="filterCountCharter">0</span></label>
        <label style="color:var(--cat-commercial);"><input type="checkbox" data-cat="commercial" checked style="accent-color:var(--cat-commercial);"> Commercial <span class="filter-count" id="filterCountCommercial">0</span></label>
      </div>
    </div>
  </div>

  <div class="scope-wrap">
    <div id="feedWarning" class="feed-warning" style="display:none;"></div>
    <div id="scope"></div>
  </div>

  <div class="modal-backdrop" id="detailBackdrop"></div>
  <div class="detail" id="detail">
    <div class="detail-head">
      <h3 id="detailTitle">—</h3>
      <button class="detail-close" id="detailClose" aria-label="Close"><i class="ph">&#xE4F6;</i></button>
    </div>
    <div id="detailPhoto"></div>
    <dl id="detailBody"></dl>
    <div class="quiz-area" id="quizArea"></div>
  </div>

  <h2 class="section-heading">Scoreboard</h2>
  <div id="dash-view"></div>

  <h2 class="section-heading">My Collection</h2>
  <div class="status">
    <div><span id="importStatus" style="color:var(--amber);"></span></div>
  </div>
  <div class="collection-filters">
      <select id="makeFilterSelect" title="Filter by manufacturer">
        <option value="">All makes</option>
      </select>
      <select id="typeFilterSelect" title="Filter by type">
        <option value="">All types</option>
        <option value="ga">GA</option>
        <option value="rotor">Rotor</option>
        <option value="charter">Charter</option>
        <option value="commercial">Commercial</option>
      </select>
    </div>
    <div class="collection-toolbar" id="rarityCounts">
      <span class="rarity-count-col" data-rarity="Common" title="Tap to filter: Common"><span class="rarity-count-dot"></span><b id="countCommon">0</b></span>
      <span class="rarity-count-col" data-rarity="Rare" title="Tap to filter: Rare" style="color:#4da6ff;"><i class="ph">&#xEDC8;</i><b id="countRare">0</b></span>
      <span class="rarity-count-col" data-rarity="Epic" title="Tap to filter: Epic" style="color:#a855f7;"><i class="ph">&#xE42C;</i><b id="countEpic">0</b></span>
      <span class="rarity-count-col legendary-text" data-rarity="Legendary" title="Tap to filter: Legendary"><i class="ph">&#xE812;</i><b id="countLegendary">0</b></span>
      <span class="rarity-count-col" data-rarity="Unclassified" title="Tap to filter: Unclassified — interesting, not yet rarity-rated" style="color:#7dc4ff;"><i class="ph">&#xE72C;</i><b id="countUnclassified">0</b></span>
      <button id="exportBtn" class="geo-btn icon-btn" title="Export JSON" aria-label="Export JSON"><i class="ph">&#xEAF4;</i></button>
      <button id="importBtn" class="geo-btn icon-btn" title="Import JSON" aria-label="Import JSON"><i class="ph">&#xE256;</i></button>
      <input type="file" id="importFile" accept="application/json,.json" style="display:none;">
      <input type="file" id="aimPhotoInput" accept="image/*" capture="environment" style="display:none;">
    </div>
    <div class="collection-table-wrap">
      <table class="collection-table">
        <thead><tr><th></th><th>Ident</th><th>Type</th><th>Score</th><th>First tapped</th></tr></thead>
        <tbody id="logTable"><tr><td class="empty" colspan="5">Nothing collected yet — tap a plane and take a guess.</td></tr></tbody>
      </table>
    </div>

    <div class="modal-backdrop" id="collectionDetailBackdrop"></div>
    <div class="detail" id="collectionDetail">
      <div class="detail-head">
        <div class="detail-head-title">
          <h3 id="colDetailTitle">—</h3>
          <span id="colDetailRarity"></span>
        </div>
        <button class="detail-close" id="colDetailClose" aria-label="Close"><i class="ph">&#xE4F6;</i></button>
      </div>
      <div id="colDetailPhoto"></div>
      <dl id="colDetailBody"></dl>
      <div id="colDetailEdit"></div>
      <div id="colDetailLink"></div>
    </div>

</main>

const AIRPORT_TYPE_LABEL = {A:'Airport', H:'Heliport', S:'Seaplane base', U:'Ultralight', T:'Stolport', G:'Gliderport', B:'Balloonport'};
const MAX_AIRPORT_MARKERS = 400; // cap so very wide/zoomed-out views stay responsive
let airportsLayer;

function renderAirports(){
  if(!map) return;
  if(!airportsLayer) airportsLayer = L.layerGroup().addTo(map);
  airportsLayer.clearLayers();

  const bounds = map.getBounds();
  const center = bounds.getCenter();
  let inView = AIRPORTS.filter(([id,name,tcode,lat,lon]) => bounds.contains([lat,lon]));

  if(inView.length > MAX_AIRPORT_MARKERS){
    inView = inView
      .map(a => [a, haversineDist(center.lat, center.lng, a[3], a[4])])
      .sort((x,y) => x[1]-y[1])
      .slice(0, MAX_AIRPORT_MARKERS)
      .map(x => x[0]);
  }

  inView.forEach(([id, name, tcode, lat, lon, state, elev])=>{
    const shapeClass = tcode==='H' ? 'heli' : (tcode==='A' ? '' : 'other');
    const icon = L.divIcon({
      className:'airport-marker',
      html:`<div style="position:relative;"><div class="ap-dot ${shapeClass}"></div><div class="ap-label">${id}</div></div>`,
      iconSize:[70,20], iconAnchor:[5,5]
    });
    const marker = L.marker([lat, lon], {icon, interactive:true});
    const elevLine = (elev !== null && elev !== undefined) ? `Field elevation: ${elev} ft` : 'Field elevation: —';
    marker.bindPopup(
      `<b>${name}</b><br>${AIRPORT_TYPE_LABEL[tcode]||tcode} · ${id}${state?', '+state:''}<br>${elevLine}`,
      {closeButton:true, className:'ap-popup'}
    );
    airportsLayer.addLayer(marker);
  });
}

// Ray-casting point-in-polygon test. poly is an array of [lat, lon] pairs.
function pointInPolygon(lat, lon, poly){
  let inside = false;
  for(let i=0, j=poly.length-1; i<poly.length; j=i++){
    const [yi, xi] = poly[i];
    const [yj, xj] = poly[j];
    const intersects = ((yi > lat) !== (yj > lat)) &&
      (lon < (xj - xi) * (lat - yi) / (yj - yi) + xi);
    if(intersects) inside = !inside;
  }
  return inside;
}
function inCollectionZone(a){
  if(typeof a.alt_baro !== 'number') return false;
  if(a.alt_baro < MIN_ALT || a.alt_baro > MAX_ALT) return false;
  if(typeof a.lat !== 'number' || typeof a.lon !== 'number') return false;
  return pointInPolygon(a.lat, a.lon, CORRIDOR_BOX);
}

// ============ PERSONAL TYPE OVERRIDES ============
// Your own corrections when you spot a wrong classification or wrong make/model —
// keyed by ICAO type code, so a fix applies to every aircraft of that type from
// then on, not just the one tail number you happened to be looking at. These take
// priority over everything else: your correction > live global rarity data >
// baked-in database. Persisted locally and bundled into Export JSON so you can
// hand a batch of corrections back for the master database to be updated.
let typeOverrides = {}; // {code: {status?, make?, model?}}

async function loadTypeOverrides(){
  try{
    const r = await storage.get('typeOverrides');
    if(r && r.value) typeOverrides = JSON.parse(r.value) || {};
  }catch(e){ typeOverrides = {}; }
  renderMap();
  renderTable();
  renderLog();
  renderDashboard();
}

async function saveTypeOverride(code, changes){
  if(!code) return;
  const existing = typeOverrides[code] || {};
  const merged = {...existing, ...changes};
  // drop empty/unchanged fields so we don't persist "no correction" as a correction
  Object.keys(merged).forEach(k=>{ if(merged[k]===''||merged[k]==null) delete merged[k]; });
  if(Object.keys(merged).length){
    typeOverrides[code] = merged;
  } else {
    delete typeOverrides[code];
  }
  try{ await storage.set('typeOverrides', JSON.stringify(typeOverrides)); }catch(e){}
  renderMap();
  renderTable();
  renderLog();
  renderDashboard();
}

function acInfo(code){
  return code ? (AIRCRAFT_DB[code] || null) : null;
}
function typeName(code){
  const make = typeMake(code), model = typeModel(code);
  return (make && model) ? `${make} ${model}` : null;
}
function typeMake(code){
  const ov = typeOverrides[code];
  if(ov && ov.make) return ov.make;
  const info = acInfo(code);
  return info ? info[0] : null;
}
function typeModel(code){
  const ov = typeOverrides[code];
  if(ov && ov.model) return ov.model;
  const info = acInfo(code);
  return info ? info[1] : null;
}
function typeStatus(code){
  const ov = typeOverrides[code];
  if(ov && ov.status) return ov.status; // your correction wins over everything
  if(liveRarityTiers && liveRarityTiers[code]) return liveRarityTiers[code]; // then live global data
  const info = acInfo(code);
  return info ? info[2] : null; // then baked-in tier, or null if unlisted anywhere
}

// ============ LIVE RARITY DATA ============
// Fetched once per session from a small JSON file that a separate daily
// GitHub Action keeps updated (see rarity-logger.mjs) — trailing 12-complete-months
// "days seen anywhere in the world" per ICAO type code, sourced from
// airplanes.live's global /v2/type/{code} endpoint. Rarity tiers are computed
// HERE, client-side, from those raw counts (not shipped pre-computed), so the
// quartile-split logic can change later without needing to touch the data pipeline.
//
// IMPORTANT: replace this URL with your actual GitHub username/repo once the
// rarity-tracker workflow is set up and committing to your repo.
const LIVE_RARITY_URL = 'https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/rarity-data.json';

let liveRarityTiers = null; // {typeCode: 'Common'|'Rare'|'Epic'|'Legendary'} once loaded

function computeRarityTiers(counts){
  const entries = Object.entries(counts).sort((a,b)=> a[1]-b[1]); // ascending: fewest days-seen first
  const n = entries.length;
  const tiers = {};
  entries.forEach(([type], i)=>{
    const pct = i / n;
    tiers[type] = pct < 0.25 ? 'Legendary' : pct < 0.5 ? 'Epic' : pct < 0.75 ? 'Rare' : 'Common';
  });
  return tiers;
}

async function loadLiveRarityData(){
  try{
    const res = await fetch(LIVE_RARITY_URL, {cache:'no-store'});
    if(!res.ok) return;
    const counts = await res.json();
    if(!counts || typeof counts !== 'object' || !Object.keys(counts).length) return;
    liveRarityTiers = computeRarityTiers(counts);
    console.log(`Live rarity data loaded: ${Object.keys(liveRarityTiers).length} types have trailing-12mo data.`);
    // Re-render anything already on screen that shows rarity, since it may just have changed.
    renderMap();
    renderLog();
    renderDashboard();
  }catch(e){
    console.error('Could not load live rarity data — using baked-in rarity tiers instead:', e);
  }
}

// Buckets aircraft by broad category (for quiz distractor selection) using the real
// engine class / airframe class from the database, rather than a hand-maintained list.
function typeBucket(code){
  const info = acInfo(code);
  if(!info) return 'ga';
  const engine = info[3], cls = info[8];
  if(cls === 'Tiltrotor' || cls === 'Helicopter' || cls === 'Gyrocopter' || engine === 'Turboshaft') return 'heli';
  if(engine === 'Jet') return 'jet';
  return 'ga';
}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1; i>0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// Builds a 4-option multiple-choice quiz for the given type code, drawing wrong
// answers from the same bucket (jet/heli/GA) so the guesses are actually plausible.
// Each option carries its real make separately, so scoring can check the manufacturer
// against ground truth instead of guessing it from the display string.
function buildQuizOptions(code){
  const info = acInfo(code);
  if(!info) return null;
  const correctOpt = {make:info[0], model:info[1], display:(info[0]+' '+info[1])};
  const bucket = typeBucket(code);
  const pool = Object.entries(AIRCRAFT_DB)
    .filter(([c,d]) => c !== code && typeBucket(c) === bucket)
    .map(([c,d]) => ({make:d[0], model:d[1], display:(d[0]+' '+d[1])}));
  let distractors = shuffle(pool).slice(0,3);
  if(distractors.length < 3){
    // bucket too small (shouldn't normally happen) — top up from anywhere else
    const rest = Object.entries(AIRCRAFT_DB).filter(([c]) => c !== code)
      .map(([c,d]) => ({make:d[0], model:d[1], display:(d[0]+' '+d[1])}))
      .filter(o => !distractors.some(x=>x.display===o.display) && o.display !== correctOpt.display);
    distractors = distractors.concat(shuffle(rest)).slice(0,3);
  }
  return shuffle([correctOpt, ...distractors]);
}
// Compact altitude readout in hundreds of feet, aviation-style: 100ft->'01', 1400ft->'14', 23900ft->'239'
function formatAlt(alt_baro){
  if(typeof alt_baro !== 'number') return null;
  const hundreds = Math.round(alt_baro/100);
  return String(hundreds).padStart(2,'0');
}

const CATEGORY_LABELS = {
  A1:'Light', A2:'Small', A3:'Large', A4:'High-vortex Lg', A5:'Heavy', A6:'High-perf', A7:'Rotorcraft',
  B1:'Glider', B2:'Balloon', B3:'Parachute', B4:'Ultralight', B6:'UAV/Drone', B7:'Space'
};

// Classifies an aircraft into one of the four filterable buckets. ADS-B category alone
// only distinguishes size class, not GA vs charter, so callsign pattern is used as a
// secondary signal: an airline-style callsign (letters+digits, distinct from the tail
// number) on a light/small airframe usually means it's flying for hire.
function classify(a){
  if(a.category === 'A7') return 'rotor';
  if(['A3','A4','A5'].includes(a.category)) return 'commercial';
  const lightweight = ['A1','A2','A6'].includes(a.category) || (!a.category && a.r && /^N/.test(a.r));
  if(lightweight){
    const callsign = a.flight ? a.flight.trim().toUpperCase() : '';
    const reg = a.r ? a.r.replace(/-/g,'').toUpperCase() : '';
    const looksLikeCharterCallsign = /^[A-Z]{3}\d/.test(callsign) && callsign !== reg;
    return looksLikeCharterCallsign ? 'charter' : 'ga';
  }
  return 'other'; // gliders, balloons, ultralights, UAVs — not one of the four requested buckets
}

// Mirrors the --cat-* CSS variables so JS-drawn elements (map blips, table badges) use
// the same colors as the filter checkboxes.
const CATEGORY_COLORS = {ga:'#ffc670', charter:'#b98eff', rotor:'#5eead4', commercial:'#8fe3a6'};

function haversineDist(lat1,lon1,lat2,lon2){
  const R=3440.065; // nm
  const dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function bearing(lat1,lon1,lat2,lon2){
  const toRad=d=>d*Math.PI/180, toDeg=d=>d*180/Math.PI;
  const y=Math.sin(toRad(lon2-lon1))*Math.cos(toRad(lat2));
  const x=Math.cos(toRad(lat1))*Math.sin(toRad(lat2))-Math.sin(toRad(lat1))*Math.cos(toRad(lat2))*Math.cos(toRad(lon2-lon1));
  return (toDeg(Math.atan2(y,x))+360)%360;
}
// Given a start point, bearing (deg), and distance (nm), returns the destination lat/lon.
function destPoint(lat, lon, bearingDeg, distNM){
  const R=3440.065;
  const toRad=d=>d*Math.PI/180, toDeg=d=>d*180/Math.PI;
  const delta = distNM/R, theta = toRad(bearingDeg);
  const phi1 = toRad(lat), lambda1 = toRad(lon);
  const phi2 = Math.asin(Math.sin(phi1)*Math.cos(delta) + Math.cos(phi1)*Math.sin(delta)*Math.cos(theta));
  const lambda2 = lambda1 + Math.atan2(Math.sin(theta)*Math.sin(delta)*Math.cos(phi1), Math.cos(delta)-Math.sin(phi1)*Math.sin(phi2));
  return {lat: toDeg(phi2), lon: toDeg(lambda2)};
}

let pollSeq = 0;
let consecutivePollFailures = 0;
const trails = new Map(); // hex -> {points:[[lat,lon],...], lastUpdate}
const TRAIL_MAX_POINTS = 300; // ~10 min of history at 2s polling
const TRAIL_TTL_MS = 10*60*1000; // drop trails for aircraft not seen in 10 min

function updateTrails(ac){
  const now = Date.now();
  ac.forEach(a=>{
    if(typeof a.lat !== 'number' || typeof a.lon !== 'number') return;
    let t = trails.get(a.hex);
    if(!t){ t = {points:[], lastUpdate:now}; trails.set(a.hex,t); }
    const last = t.points[t.points.length-1];
    if(!last || last[0]!==a.lat || last[1]!==a.lon){
      t.points.push([a.lat,a.lon]);
      if(t.points.length > TRAIL_MAX_POINTS) t.points.shift();
    }
    t.lastUpdate = now;
  });
  for(const [hex,t] of trails){
    if(now - t.lastUpdate > TRAIL_TTL_MS) trails.delete(hex);
  }
}

async function poll(){
  if(!map) return;
  const seq = ++pollSeq;
  try{
    const bounds = map.getBounds();
    const center = bounds.getCenter();
    const corners = [bounds.getNorthEast(), bounds.getNorthWest(), bounds.getSouthEast(), bounds.getSouthWest()];
    let radius = 0;
    corners.forEach(c=>{ const d = haversineDist(center.lat, center.lng, c.lat, c.lng); if(d>radius) radius=d; });
    radius = Math.min(Math.max(radius, MIN_FETCH_RADIUS_NM), MAX_FETCH_RADIUS_NM);

    const res = await fetch(`https://api.airplanes.live/v2/point/${center.lat}/${center.lng}/${radius}`);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if(seq !== pollSeq) return; // a newer poll already landed; discard this stale response

    const ac = (data.ac || [])
      .filter(a=> a.alt_baro !== 'ground' && a.alt_baro !== undefined) // airborne only
      .filter(a=> typeof a.lat === 'number' && typeof a.lon === 'number' && bounds.contains([a.lat,a.lon])) // strictly inside the visible map, not just the query circle
      .map(a=>{
        // distance/bearing are always relative to your window, regardless of where the map is currently panned
        const dist = haversineDist(CENTER.lat,CENTER.lon,a.lat,a.lon);
        const dir = bearing(CENTER.lat,CENTER.lon,a.lat,a.lon);
        return {...a, _dist:dist, _dir:dir};
      }).sort((x,y)=>x._dist-y._dist);

    currentAircraft = ac;
    updateTrails(ac);
    const acCountEl = document.getElementById('acCount');
    if(acCountEl) acCountEl.textContent = ac.length;
    updateFilterCounts();

    renderTable();
    renderMap();
    if(hardModeGateHex) updateAimGate(); // target moves even when the phone doesn't — refresh on new data, not just new orientation
    consecutivePollFailures = 0;
    const warnEl = document.getElementById('feedWarning');
    if(warnEl) warnEl.style.display = 'none';
  }catch(e){
    consecutivePollFailures++;
    console.error('poll failed:', e);
    const warnEl = document.getElementById('feedWarning');
    if(warnEl){
      warnEl.style.display = 'block';
      warnEl.innerHTML = consecutivePollFailures > 1
        ? `<i class="ph">&#xE4E0;</i> Live feed unavailable (${consecutivePollFailures} failed attempts) — still retrying…`
        : `<i class="ph">&#xE4E0;</i> Live feed unavailable — airplanes.live may be rate-limiting or unreachable. Retrying…`;
    }
  }
}

function visibleList(){
  return currentAircraft.filter(a => activeFilters.has(classify(a)));
}

// Counts every aircraft currently in view by category, independent of which
// checkboxes are on — so you can see how many Charter flights are out there
// even while that filter is off.
function updateFilterCounts(){
  const counts = {ga:0, rotor:0, charter:0, commercial:0};
  currentAircraft.forEach(a=>{
    const c = classify(a);
    if(counts.hasOwnProperty(c)) counts[c]++;
  });
  const set = (id,val)=>{ const el = document.getElementById(id); if(el) el.textContent = val; };
  set('filterCountGa', counts.ga);
  set('filterCountRotor', counts.rotor);
  set('filterCountCharter', counts.charter);
  set('filterCountCommercial', counts.commercial);
}

function renderTable(){
  const list = visibleList();
  const acShownEl = document.getElementById('acShown');
  if(acShownEl) acShownEl.textContent = list.length;
}

// Every guess gets appended here — this is what the Dashboard tab reads from.
async function logGuess(entry){
  entry.ts = new Date().toISOString();
  let log = [];
  try{ const r = await storage.get('game:log'); log = r ? JSON.parse(r.value) : []; }catch(e){ log = []; }
  log.push(entry);
  if(log.length > MAX_LOG_ENTRIES) log = log.slice(log.length - MAX_LOG_ENTRIES);
  try{ await storage.set('game:log', JSON.stringify(log)); }catch(e){ console.error('log save failed', e); }
}

// Collection is now tap-driven: every plane you tap (and either guess or reveal)
// gets a record here, with your best/most recent ID score attached. score is
// 0-100, or null if this type code has no dictionary entry to grade against.
async function collectAircraft(a, score){
  const key = 'bird:'+a.hex;
  const nowISO = new Date().toISOString();
  let rec = null;
  try{ const r = await storage.get(key); rec = r ? JSON.parse(r.value) : null; }catch(e){ rec = null; }
  if(!rec){
    rec = {hex:a.hex, reg:a.r||null, type:a.t||null, category:a.category||null, group:classify(a),
           first_seen:nowISO, last_seen:nowISO, guesses:0, bestScore:null, lastScore:null};
    newThisSession.add(a.hex);
  }
  rec.last_seen = nowISO;
  rec.reg = rec.reg || a.r || null;
  rec.type = rec.type || a.t || null;
  rec.category = rec.category || a.category || null;
  rec.group = rec.group || classify(a);
  rec.guesses = (rec.guesses||0) + 1;
  if(score !== null && score !== undefined){
    rec.lastScore = score;
    rec.bestScore = (rec.bestScore===null || rec.bestScore===undefined) ? score : Math.max(rec.bestScore, score);
  }
  try{ await storage.set(key, JSON.stringify(rec)); }catch(e){ console.error('storage set failed', e); }
}

function startQuiz(hex){
  const a = currentAircraft.find(x=>x.hex===hex);
  if(!a) return;
  const options = buildQuizOptions(a.t);
  if(!options){
    // Type code not in our 388-entry database (or airplanes.live didn't report one at all) —
    // nothing to grade, but it still counts as a genuine catch.
    revealedHexes.add(hex);
    quizStates.set(hex, {options:null, chosen:null, score:null, noData:true});
    collectAircraft(a, null).then(()=>{ renderTable(); renderMap(); renderLog(); });
    showDetail(hex);
    renderTable();
    return;
  }
  quizStates.set(hex, {options, chosen:null, score:null});
  showDetail(hex);
}

async function submitGuess(hex, chosenDisplay, chosenMake){
  const a = currentAircraft.find(x=>x.hex===hex);
  if(!a) return;
  const info = acInfo(a.t);
  const correct = info ? (info[0]+' '+info[1]) : null;
  const correctMake = info ? info[0] : null;
  // Scoring: exact model match = 100%, right manufacturer but wrong model = 50%, otherwise 0%.
  const rawScore = chosenDisplay === correct ? 100 : (chosenMake === correctMake ? 50 : 0);
  // Photo hints make identification meaningfully easier, so a guess made with hints on
  // is worth half — keeps your Scoreboard honest about how you're actually doing when
  // you don't have a picture to lean on, versus when you do.
  const usedPhotoHint = photoHintsEnabled;
  const score = usedPhotoHint ? Math.round(rawScore / 2) : rawScore;

  const state = quizStates.get(hex) || {};
  state.chosen = chosenDisplay;
  state.score = score;
  state.rawScore = rawScore;
  state.usedPhotoHint = usedPhotoHint;
  quizStates.set(hex, state);
  revealedHexes.add(hex);

  await collectAircraft(a, score);
  await logGuess({hex:a.hex, typeCode:a.t, correctName:correct, correctMake, chosenName:chosenDisplay, chosenMake, score, rawScore, usedPhotoHint, bucket: typeBucket(a.t), category: classify(a)});

  gameScore.total++;
  gameScore.sumScore = (gameScore.sumScore||0) + score;
  if(score===100) gameScore.perfect = (gameScore.perfect||0)+1;
  saveGameScore();
  updateScoreDisplay();
  showDetail(hex);
  renderTable();
  renderMap();
  renderDashboard();
  renderLog();
}

// Real photo of the specific aircraft you tapped, by its hex code — the same
// Planespotters.net endpoint ADSBExchange's own live map uses. Not a stock photo of
// the type: this is (when available) that exact tail number.
async function fetchActualPhoto(hex, reg, typeCode){
  try{
    // Planespotters' own examples (e.g. ADSBExchange's live map) query with uppercase
    // hex — airplanes.live gives us lowercase, so normalize before asking.
    let url = `https://api.planespotters.net/pub/photos/hex/${hex.toUpperCase()}`;
    const params = [];
    if(reg) params.push(`reg=${encodeURIComponent(reg)}`);
    if(typeCode) params.push(`icaoType=${encodeURIComponent(typeCode)}`);
    if(params.length) url += '?' + params.join('&');
    const res = await fetch(url);
    if(!res.ok) return null;
    const data = await res.json();
    const p = data.photos && data.photos[0];
    if(!p) return null;
    const src = (p.thumbnail_large && p.thumbnail_large.src) || (p.thumbnail && p.thumbnail.src);
    if(!src) return null;
    return {src, credit: p.photographer || null, link: p.link || null};
  }catch(e){ return null; }
}

// Fetches a page's thumbnail image given an exact (or redirect-resolved) title.
async function fetchWikiSummaryThumbnail(title){
  try{
    const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`);
    if(!res.ok) return null;
    const data = await res.json();
    if(data.thumbnail && data.thumbnail.source){
      const link = data.content_urls && data.content_urls.desktop && data.content_urls.desktop.page;
      return {src: data.thumbnail.source, link: link || null};
    }
  }catch(e){}
  return null;
}

// Representative photo of a guessed TYPE (not a specific airframe) via Wikipedia's
// image API. Tries the full display name first, then just make + first model word,
// since aircraft articles are often titled more tersely than our display name — then,
// if neither is a real title, falls back to an actual Wikipedia search so odd/terse
// model strings (e.g. "Cessna 1SP") still have a shot at finding the closest real article.
async function fetchTypePhoto(displayName){
  const words = displayName.split(' ');
  const attempts = [displayName];
  if(words.length > 2) attempts.push(words.slice(0,2).join(' '));
  for(const title of attempts){
    const photo = await fetchWikiSummaryThumbnail(title);
    if(photo) return photo;
  }
  try{
    const searchRes = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(displayName+' aircraft')}&format=json&origin=*&srlimit=1`);
    if(searchRes.ok){
      const searchData = await searchRes.json();
      const hit = searchData.query && searchData.query.search && searchData.query.search[0];
      if(hit && hit.title){
        const photo = await fetchWikiSummaryThumbnail(hit.title);
        if(photo) return photo;
      }
    }
  }catch(e){}
  return null;
}

// Renders the guessed-vs-actual photo comparison into the quiz result, async since both
// lookups are network calls — the container is a live DOM query so if the user has since
// selected a different aircraft, the results just have nowhere to land.
async function renderPhotoCompare(hex, a, model, state){
  const container = document.getElementById('photoCompare');
  if(!container) return;

  const showGuessPhoto = state.score < 100;
  let [actual, guessed] = await Promise.all([
    fetchActualPhoto(hex, a.r, a.t),
    showGuessPhoto ? fetchTypePhoto(state.chosen) : Promise.resolve(null)
  ]);

  // Planespotters won't have every tail number — many GA and less-common aircraft
  // simply haven't been photographed by a contributor. Rather than a dead end, fall
  // back to a representative photo of the type, clearly labeled as such.
  let actualIsRepresentative = false;
  if(!actual){
    actual = await fetchTypePhoto(model);
    actualIsRepresentative = !!actual;
  }

  const stillThere = document.getElementById('photoCompare');
  if(!stillThere) return;

  const col = (label, photo, caption, credit, isRepresentative) => `
    <div class="photo-compare-col">
      <div class="photo-label">${label}</div>
      ${photo
        ? `<div class="photo-img-wrap"><img src="${photo.src}" alt="${caption}" loading="lazy">${isRepresentative ? '<div class="photo-overlay-badge">Representative image</div>' : ''}</div>`
        : `<a class="photo-missing" href="https://www.google.com/search?tbm=isch&q=${encodeURIComponent(caption)}" target="_blank" rel="noopener">No photo found<span class="photo-missing-link">Search Google Images <i class="ph">&#xE06C;</i></span></a>`}
      <div class="photo-caption">${caption}</div>
      ${credit ? `<div class="photo-credit"><i class="ph">&#xE10E;</i> ${credit} · Planespotters.net</div>` : ''}
    </div>`;

  let html = '<div class="photo-compare">';
  if(showGuessPhoto) html += col('You guessed', guessed, state.chosen, null, false);
  html += col(
    'It actually was',
    actual,
    model + (a.r ? ` (${a.r})` : ''),
    actual && !actualIsRepresentative && actual.credit,
    actualIsRepresentative
  );
  html += '</div>';

  const query = showGuessPhoto ? `${state.chosen} vs ${model}` : model;
  html += `<a class="photo-fallback-link" href="https://www.google.com/search?tbm=isch&q=${encodeURIComponent(query)}" target="_blank" rel="noopener"><i class="ph">&#xEA64;</i> Compare more photos on Google Images</a>`;

  stillThere.innerHTML = html;
}

function showDetail(hex){
  const a = currentAircraft.find(x=>x.hex===hex);
  if(!a) return;
  const box = document.getElementById('detail');
  box.classList.add('show');
  document.getElementById('detailBackdrop').classList.add('show');
  document.getElementById('detailTitle').textContent = a.flight ? a.flight.trim() : (a.r || a.hex);

  const revealed = revealedHexes.has(hex);
  const model = typeName(a.t);
  const rows = [
    ['Registration', a.r||'—'],
  ];
  if(revealed){
    rows.push(['Type code', a.t ? `${a.t}${model?' — '+model:''}` : '—']);
    const status = typeStatus(a.t);
    if(status) rows.push(['Rarity', rarityBadgeHtml(status)]);
  }
  rows.push(
    ['Category', a.category ? `${a.category} — ${CATEGORY_LABELS[a.category]||''}` : '—'],
    ['Altitude', a.alt_baro!==undefined?a.alt_baro+' ft':'—'],
    ['Ground speed', a.gs!==undefined?Math.round(a.gs)+' kt':'—'],
    ['Track', a.track!==undefined?Math.round(a.track)+'°':'—'],
    ['Distance / bearing', a._dist!==null?`${(a._dist/MI_TO_NM).toFixed(1)} mi @ ${Math.round(a._dir)}°`:'—'],
  );
  document.getElementById('detailBody').innerHTML = rows.map(([k,v])=>`<dt>${k}</dt><dd>${v}</dd>`).join('');

  if(revealed || photoHintsEnabled){
    renderCollectionPhoto({hex:a.hex, reg:a.r, type:a.t}, model, `${model||a.t||''} ${a.r||''}`.trim(), 'detailPhoto');
  } else {
    const photoEl = document.getElementById('detailPhoto');
    if(photoEl) photoEl.innerHTML = '';
  }

  const quizEl = document.getElementById('quizArea');
  const state = quizStates.get(hex);
  if(revealed){
    if(state && state.chosen){
      const rawScore = state.rawScore !== undefined ? state.rawScore : state.score; // older records won't have rawScore stored
      const cls = rawScore===100 ? 'correct' : rawScore===50 ? 'partial' : 'wrong';
      const headlineText = rawScore===100 ? 'nailed it!' : rawScore===50 ? 'right make, wrong model' : 'not quite';
      const headlineIcon = rawScore===100 ? '&#xE666;' : rawScore===50 ? '&#xE43A;' : '&#xE442;';
      const headline = `<i class="ph">${headlineIcon}</i> ${state.score}% — ${headlineText}`;
      const hintNote = state.usedPhotoHint
        ? `<div class="photo-hint-note"><i class="ph">&#xE10E;</i> Photo hint was on — score halved (would've been ${rawScore}% without it)</div>`
        : '';
      quizEl.innerHTML = `<div class="quiz-result ${cls}">${headline}<br>You guessed <b>${state.chosen}</b> — it's actually a <b>${model}</b>.</div>${hintNote}
        <div class="photo-compare-loading" id="photoCompare">Loading photos…</div>`;
      renderPhotoCompare(hex, a, model, state);
    } else if(state && state.noData){
      quizEl.innerHTML = `<div class="quiz-result" style="color:var(--muted);border-color:var(--grid);">
        ${a.t ? `Type <b>${a.t}</b> isn't in the aircraft database yet` : 'No type code reported for this aircraft'} —
        logged as a catch, but there's nothing to quiz you on.
      </div>`;
    } else {
      quizEl.innerHTML = '';
    }
  } else if(state && state.options){
    if(hardModeActive && !hardModeAimedHexes.has(hex)){
      renderAimGate(hex, a);
    } else {
      const capturedPhoto = hardModePhotos.get(hex);
      const photoHtml = capturedPhoto ? `<img class="aim-captured-photo" src="${capturedPhoto}" alt="Your photo of this aircraft">` : '';
      quizEl.innerHTML = photoHtml + `<div class="quiz-prompt">What is it?</div>` +
        state.options.map(opt => `<button class="quiz-opt" data-choice="${opt.display.replace(/"/g,'&quot;')}" data-make="${opt.make.replace(/"/g,'&quot;')}">${opt.display}</button>`).join('');
      quizEl.querySelectorAll('.quiz-opt').forEach(btn=>{
        btn.addEventListener('click', ()=> submitGuess(hex, btn.dataset.choice, btn.dataset.make));
      });
    }
  } else {
    quizEl.innerHTML = `<button id="startQuizBtn" class="geo-btn"><i class="ph">&#xE67E;</i> Guess the make &amp; model</button>`;
    document.getElementById('startQuizBtn').addEventListener('click', ()=> startQuiz(hex));
  }
}

let map, aircraftLayer, zoneLayer, centerMarker;
const RING_DISTANCES_NM = [5, 10, 20, 50];
let rangeRingCircles = [];
let rangeRingLabels = [];

function buildRangeRings(){
  RING_DISTANCES_NM.forEach(nm=>{
    const circle = L.circle([CENTER.lat, CENTER.lon], {
      radius: nm * 1852, // Leaflet circle radius is in meters; 1 nm = 1852 m
      color:'#8fe3a6', weight:1, opacity:0.22, dashArray:'3,7', fill:false, interactive:false
    }).addTo(map);
    const labelPt = destPoint(CENTER.lat, CENTER.lon, 0, nm);
    const label = L.marker([labelPt.lat, labelPt.lon], {
      icon: L.divIcon({className:'alt-label', html:`${nm} NM`, iconSize:[40,14], iconAnchor:[20,7]}),
      interactive:false
    }).addTo(map);
    rangeRingCircles.push(circle);
    rangeRingLabels.push(label);
  });
}

// Called whenever CENTER moves (e.g. GPS update) to reposition the pin, rings, and header readout.
function updateCenterVisuals(){
  centerMarker.setLatLng([CENTER.lat, CENTER.lon]);
  RING_DISTANCES_NM.forEach((nm,i)=>{
    rangeRingCircles[i].setLatLng([CENTER.lat, CENTER.lon]);
    const labelPt = destPoint(CENTER.lat, CENTER.lon, 0, nm);
    rangeRingLabels[i].setLatLng([labelPt.lat, labelPt.lon]);
  });
  const coordsEl = document.getElementById('centerCoordsDisplay');
  if(coordsEl) coordsEl.textContent = `${CENTER.lat.toFixed(4)}, ${CENTER.lon.toFixed(4)}`;
}

function initMap(){
  map = L.map('scope', {attributionControl:false, zoomControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom:19,
    attribution:'&copy; OpenStreetMap contributors &copy; CARTO'
  }).addTo(map);

  // Dedicated pane so aircraft always render above airports, regardless of add order —
  // Leaflet's default marker pane (z=600) is shared by every L.marker, and LayerGroup
  // itself has no bringToFront(); panes are the correct way to guarantee stacking
  // across a mix of circleMarkers and icon markers like ours.
  map.createPane('aircraftPane');
  map.getPane('aircraftPane').style.zIndex = 650;

  // Leaflet caches its container's pixel size at init time and won't notice if that
  // size changes later (web fonts finishing, layout settling, orientation change,
  // grid breakpoint switching) — which shows up as the map being clipped/cut off.
  // ResizeObserver keeps it in sync automatically whenever the container actually resizes.
  const scopeEl = document.getElementById('scope');
  if(window.ResizeObserver){
    new ResizeObserver(()=>{ if(map) map.invalidateSize(); }).observe(scopeEl);
  } else {
    window.addEventListener('resize', ()=>{ if(map) map.invalidateSize(); });
  }
  window.addEventListener('load', ()=>{ if(map) map.invalidateSize(); });

  aircraftLayer = L.layerGroup().addTo(map);

  centerMarker = L.marker([CENTER.lat,CENTER.lon], {
    icon: L.divIcon({className:'center-pin', html:'', iconSize:[10,10]})
  }).addTo(map);

  buildRangeRings();

  map.on('click', ()=>{
    if(selectedHex) closeDetail();
  });

  // Re-filters the local airport dataset for whatever's now in view — no network
  // call involved, so this is free to run on every pan/zoom.
  map.on('moveend', ()=>{
    renderAirports();
  });

  map.setView([CENTER.lat, CENTER.lon], 13);
  renderAirports();
}

function closeDetail(){
  selectedHex = null;
  hardModeGateHex = null;
  stopAimCamera();
  document.getElementById('detail').classList.remove('show');
  document.getElementById('detailBackdrop').classList.remove('show');
  renderTable();
  renderMap();
}

function selectAircraft(hex){
  if(selectedHex === hex){
    closeDetail(); // already re-renders table/map
    return;
  }
  selectedHex = hex;
  showDetail(hex);
  renderTable();
  renderMap();
}

document.getElementById('detailClose').addEventListener('click', closeDetail);
document.getElementById('detailBackdrop').addEventListener('click', closeDetail);

function renderMap(){
  if(!aircraftLayer) return;
  aircraftLayer.clearLayers();
  const list = visibleList();
  list.forEach(a=>{
    if(typeof a.lat !== 'number' || typeof a.lon !== 'number') return;
    const isNew = newThisSession.has(a.hex);
    const isSel = a.hex===selectedHex;
    const dimmed = selectedHex && !isSel;
    const fill = isNew ? '#ff6fa5' : (CATEGORY_COLORS[classify(a)] || '#8fe3a6');

    // breadcrumb trail accumulated since the page loaded
    const t = trails.get(a.hex);
    if(t && t.points.length > 1){
      L.polyline(t.points, {
        color: fill, weight:1.2, opacity: dimmed ? 0.12 : 0.4, interactive:false, pane:'aircraftPane'
      }).addTo(aircraftLayer);
    }

    // Common (or unlisted) aircraft still render as a simple dot. Rare/Epic/Legendary/
    // Unclassified get a Phosphor icon instead, colored by category — Legendary overrides
    // that with the animated gradient as its own "this one's special" signal.
    const rarity = typeStatus(a.t);
    if(rarity === 'Rare' || rarity === 'Epic' || rarity === 'Legendary' || rarity === 'Unclassified'){
      const glyph = RARITY_GLYPHS[rarity];
      const isLegendary = rarity === 'Legendary';
      const iconColorStyle = isLegendary ? '' : `color:${isSel ? '#eafff0' : fill};`;
      const iconClass = 'ph rarity-icon' + (isLegendary ? ' legendary-text' : '');
      const icon = L.divIcon({
        className: 'rarity-marker',
        html: `<span class="${iconClass}" style="${iconColorStyle}font-size:${isSel?26:20}px;opacity:${dimmed?0.35:1};">${glyph}</span>`,
        iconSize: [28,28], iconAnchor: [14,14]
      });
      aircraftLayer.addLayer(L.marker([a.lat,a.lon], {icon, interactive:false, pane:'aircraftPane'}));
    } else {
      const marker = L.circleMarker([a.lat,a.lon], {
        radius: isSel?8:5,
        color: isSel ? '#eafff0' : fill,
        weight: isSel ? 2 : 0.5,
        fillColor: fill,
        fillOpacity: dimmed ? 0.3 : 0.9,
        opacity: dimmed ? 0.3 : 1,
        interactive: false, // purely visual — the larger hit target below handles taps
        pane: 'aircraftPane'
      });
      aircraftLayer.addLayer(marker);
    }

    // A 5px dot is far too small to reliably tap on a phone. This larger, effectively
    // invisible circle sits on top and actually catches the touch (fillOpacity kept just
    // above 0 rather than exactly 0, since some browsers won't hit-test a fully transparent
    // shape even with pointer-events enabled).
    const hitTarget = L.circleMarker([a.lat,a.lon], {
      radius: 16,
      stroke: false,
      fillOpacity: 0.01,
      bubblingMouseEvents: false,
      pane: 'aircraftPane'
    });
    hitTarget.bindTooltip(a.flight?a.flight.trim():(a.r||a.hex), {direction:'top', opacity:0.9});
    hitTarget.on('click', ()=> selectAircraft(a.hex));
    aircraftLayer.addLayer(hitTarget);

    // estimated heading vector: projects ~1 minute of travel along current ground track
    if(typeof a.track === 'number'){
      const speedKt = typeof a.gs === 'number' ? a.gs : 90;
      const lengthNM = Math.min(Math.max(speedKt/60, 0.08), 1.2);
      const tip = destPoint(a.lat, a.lon, a.track, lengthNM);
      const vector = L.polyline([[a.lat,a.lon],[tip.lat,tip.lon]], {
        color: isSel ? '#eafff0' : fill,
        weight: isSel ? 2 : 1.3,
        opacity: dimmed ? 0.25 : 0.75,
        interactive:false,
        pane:'aircraftPane'
      });
      aircraftLayer.addLayer(vector);
    }

    // compact altitude label (hundreds of feet), offset just past the dot
    const altText = formatAlt(a.alt_baro);
    if(altText){
      const altMarker = L.marker([a.lat,a.lon], {
        icon: L.divIcon({className:'alt-label', html:altText, iconSize:[30,14], iconAnchor:[-8,7]}),
        interactive:false,
        opacity: dimmed ? 0.35 : 1,
        pane: 'aircraftPane'
      });
      aircraftLayer.addLayer(altMarker);
    }
  });
}

let collectionMakeFilter = '';
let collectionTypeFilter = '';
let collectionRarityFilter = '';

// Records store TWO different things under similar names: the raw ADS-B emitter
// category (e.g. "A1", "A7" — used for the "ADS-B category" detail display) and the
// app's own GA/Rotor/Charter/Commercial bucket (classify()'s result, stored as
// `group`). The Type filter needs the bucket, not the raw code — those are different
// vocabularies and comparing one against the other never matched anything. Records
// collected before `group` existed won't have it stored; this best-effort maps the
// raw category back to a bucket for those (GA vs Charter can't be recovered
// retroactively since that distinction needs the original callsign, which was never
// stored — those just default to 'ga').
function categoryToGroupFallback(rawCategory){
  if(rawCategory === 'A7') return 'rotor';
  if(['A3','A4','A5'].includes(rawCategory)) return 'commercial';
  if(['A1','A2','A6'].includes(rawCategory)) return 'ga';
  return null;
}

// Resolves a record's effective GA/Rotor/Charter/Commercial bucket: your type-wide
// correction (if you've made one for this type code) wins over everything, same
// priority order as rarity/make/model. Falls back to what was actually observed at
// catch time when there's no correction.
function resolveRecordGroup(r){
  const ov = typeOverrides[r.type];
  if(ov && ov.group) return ov.group;
  return r.group || categoryToGroupFallback(r.category);
}

// Applies the make/type filters, and optionally rarity too. Rarity is kept separate
// so the rarity chips can show live counts under the current make/type selection
// without their own filter hiding themselves from the count.
function applyCollectionFilters(recs, includeRarity){
  return recs.filter(r=>{
    if(collectionMakeFilter && typeMake(r.type) !== collectionMakeFilter) return false;
    if(collectionTypeFilter && resolveRecordGroup(r) !== collectionTypeFilter) return false;
    if(includeRarity && collectionRarityFilter && typeStatus(r.type) !== collectionRarityFilter) return false;
    return true;
  });
}

async function renderLog(){
  let keys = [];
  try{
    const r = await storage.list('bird:');
    keys = r ? r.keys : [];
  }catch(e){ keys = []; }
  if(!keys.length){
    document.getElementById('logTable').innerHTML = `<tr><td class="empty" colspan="5">Nothing collected yet — tap a plane and take a guess.</td></tr>`;
    updateRarityCounts([]);
    populateMakeFilter([]);
    return;
  }
  const recs = [];
  for(const k of keys){
    try{
      const r = await storage.get(k);
      if(r) recs.push(JSON.parse(r.value));
    }catch(e){}
  }

  populateMakeFilter(recs);
  updateRarityCounts(applyCollectionFilters(recs, false)); // faceted by make/type, not by rarity itself
  document.querySelectorAll('.rarity-count-col[data-rarity]').forEach(el=>{
    el.classList.toggle('active', el.dataset.rarity === collectionRarityFilter);
  });

  const filtered = applyCollectionFilters(recs, true);
  filtered.sort((a,b)=> new Date(b.last_seen) - new Date(a.last_seen));

  if(!filtered.length){
    document.getElementById('logTable').innerHTML = `<tr><td class="empty" colspan="5">Nothing matches the current filters.</td></tr>`;
    return;
  }

  document.getElementById('logTable').innerHTML = filtered.map(r=>{
    const model = typeName(r.type);
    const isRepeat = (r.guesses||1) >= 2;
    const hasScore = r.bestScore !== null && r.bestScore !== undefined;
    const scoreColor = !hasScore ? 'var(--muted)' : r.bestScore===100 ? 'var(--phosphor)' : r.bestScore===50 ? 'var(--amber)' : 'var(--magenta)';
    const scoreLabel = hasScore
      ? `<span style="color:${scoreColor};font-size:12px;">${r.bestScore}%</span>`
      : `<span style="color:var(--muted);">—</span>`;
    return `<tr class="${isRepeat?'repeat-catch':''}" data-hex="${r.hex}" style="cursor:pointer;">
      <td>${rarityIconOnly(typeStatus(r.type))}</td>
      <td>${r.reg||r.hex}</td>
      <td>${r.type||'—'}${model?`<div class="model">${model}</div>`:''}</td>
      <td>${scoreLabel}</td>
      <td>${formatDateShort(r.first_seen)}</td>
    </tr>`;
  }).join('');

  document.querySelectorAll('#logTable tr[data-hex]').forEach(row=>{
    row.addEventListener('click', ()=> showCollectionDetail(row.dataset.hex));
  });
}

  collectionMakeFilter = sel.value;
}

// Full detail modal for a collected aircraft: the record's own history plus every
// field available for that type code in the aircraft database.
async function showCollectionDetail(hex){
  currentDetailHex = hex;
  let rec = null;
  try{ const r = await storage.get('bird:'+hex); rec = r ? JSON.parse(r.value) : null; }catch(e){}
  if(!rec) return;

  const info = acInfo(rec.type);
  const make = typeMake(rec.type), modelName = typeModel(rec.type), status = typeStatus(rec.type);
  const model = (make && modelName) ? `${make} ${modelName}` : null;
  const isOverridden = !!typeOverrides[rec.type];
  document.getElementById('colDetailTitle').textContent = rec.reg || rec.hex;
  document.getElementById('colDetailRarity').innerHTML = status ? rarityBadgeHtml(status) : '';

  const rows = [
    ['Registration', rec.reg || '—'],
    ['Type code', rec.type || '—'],
  ];
  const group = resolveRecordGroup(rec);
  const GROUP_LABELS = {ga:'GA', rotor:'Rotor', charter:'Charter', commercial:'Commercial'};
  if(group) rows.push(['Type', GROUP_LABELS[group] || group]);
  if(info || isOverridden){
    rows.push(
      ['Manufacturer', make || '—'],
      ['Model', modelName || '—'],
      ['Engine class', info && info[3] || '—'],
      ['Approach speed', info && info[4]!=null ? `${info[4]} kt` : '—'],
      ['Wingspan', info && info[5]!=null ? `${info[5]} ft` : '—'],
      ['Length', info && info[6]!=null ? `${info[6]} ft` : '—'],
      ['Airframe class', info && info[8] || '—'],
    );
  } else {
    rows.push(['Aircraft database', 'No entry for this type code']);
  }
  rows.push(
    ['ADS-B category', rec.category ? `${rec.category} — ${CATEGORY_LABELS[rec.category]||''}` : '—'],
    ['First tapped', new Date(rec.first_seen).toLocaleString()],
    ['Last tapped', new Date(rec.last_seen).toLocaleString()],
    ['Guesses', rec.guesses || 1],
    ['Best score', rec.bestScore!=null ? `${rec.bestScore}%` : '—'],
    ['Last score', rec.lastScore!=null ? `${rec.lastScore}%` : '—'],
  );
  if(isOverridden) rows.push(['Classification', '<span style="color:var(--amber);">Personally corrected</span>']);

  document.getElementById('colDetailBody').innerHTML = rows.map(([k,v])=>`<dt>${k}</dt><dd>${v}</dd>`).join('');
  renderTypeEditForm(hex, rec.type, {make, model: modelName, status, group});

  const linkEl = document.getElementById('colDetailLink');
  linkEl.innerHTML = rec.reg
    ? `<a class="photo-fallback-link" href="https://www.flightradar24.com/data/aircraft/${encodeURIComponent(rec.reg.toLowerCase())}" target="_blank" rel="noopener">View Flights</a>`
    : '';

  const photoQueryParts = [];
  if(info){ photoQueryParts.push(info[0], info[1]); } else if(rec.type){ photoQueryParts.push(rec.type); }
  if(rec.reg) photoQueryParts.push(rec.reg);
  renderCollectionPhoto(rec, model, photoQueryParts.join(' '));

  document.getElementById('collectionDetail').classList.add('show');
  document.getElementById('collectionDetailBackdrop').classList.add('show');
}
