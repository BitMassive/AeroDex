// Pokedex-style rarity tiers from the aircraft database. Legendary gets a gradient
// instead of a flat color — its own visual "tell" separate from category color.
const RARITY_COLORS = {Common:'#8fa8a0', Rare:'#4da6ff', Epic:'#a855f7', Legendary:'#ffd700', Unclassified:'#7dc4ff'};
function rarityBadgeHtml(status){
  if(!status) return '<span style="color:var(--muted);">—</span>';
  if(status === 'Legendary'){
    return `<span class="rarity-badge legendary-text" style="border-color:#ffd700;">${status}</span>`;
  }
  const c = RARITY_COLORS[status] || 'var(--muted)';
  return `<span class="rarity-badge" style="color:${c};border-color:${c};">${status}</span>`;
}

// Table-specific rarity rendering: nothing for Common, icon only (no word) otherwise.
const RARITY_GLYPHS = {Rare:'\uEDC8', Epic:'\uE42C', Legendary:'\uE812', Unclassified:'\uE72C'};
function rarityIconOnly(status){
  if(!status || status === 'Common') return '';
  const glyph = RARITY_GLYPHS[status];
  if(!glyph) return '';
  if(status === 'Legendary'){
    return `<i class="ph legendary-text" style="font-size:16px;">${glyph}</i>`;
  }
  const c = RARITY_COLORS[status] || 'var(--muted)';
  return `<i class="ph" style="color:${c};font-size:16px;">${glyph}</i>`;
}

// mm/dd/yy, zero-padded
function formatDateShort(dateStr){
  const d = new Date(dateStr);
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const yy = String(d.getFullYear()).slice(-2);
  return `${mm}/${dd}/${yy}`;
}

function updateRarityCounts(recs){
  const counts = {Common:0, Rare:0, Epic:0, Legendary:0, Unclassified:0};
  recs.forEach(r=>{
    const status = typeStatus(r.type);
    if(status && counts.hasOwnProperty(status)) counts[status]++;
  });
  const set = (id,val)=>{ const el = document.getElementById(id); if(el) el.textContent = val; };
  set('countCommon', counts.Common);
  set('countRare', counts.Rare);
  set('countEpic', counts.Epic);
  set('countLegendary', counts.Legendary);
  set('countUnclassified', counts.Unclassified);
}

function scoreColor(acc){
  return acc>=80 ? 'var(--phosphor)' : acc>=50 ? 'var(--amber)' : 'var(--magenta)';
}

async function renderDashboard(){
  const dashEl = document.getElementById('dash-view');
  let log = [];
  try{ const r = await storage.get('game:log'); log = r ? JSON.parse(r.value) : []; }catch(e){ log = []; }

  if(!log.length){
    dashEl.innerHTML = `<div class="status"><div class="empty" style="padding:24px 0;">No guesses yet — head to Live Scope, tap a plane, and take a guess. Your stats build up here as you go.</div></div>`;
    return;
  }

  const total = log.length;
  const avg = Math.round(log.reduce((s,e)=>s+e.score,0)/total);
  const perfect = log.filter(e=>e.score===100).length;
  const partial = log.filter(e=>e.score===50).length;
  const missed = log.filter(e=>e.score===0).length;

  // Rolling average trend, plus a first-half vs second-half comparison for a quick read on direction.
  const windowSize = Math.max(3, Math.min(10, Math.floor(total/3) || 3));
  const rolling = log.map((_,i)=>{
    const start = Math.max(0, i-windowSize+1);
    const slice = log.slice(start, i+1);
    return slice.reduce((s,e)=>s+e.score,0)/slice.length;
  });
  const mid = Math.floor(total/2);
  const firstAvg = mid ? log.slice(0,mid).reduce((s,e)=>s+e.score,0)/mid : avg;
  const secondAvg = (total-mid) ? log.slice(mid).reduce((s,e)=>s+e.score,0)/(total-mid) : avg;
  const trendDelta = Math.round(secondAvg - firstAvg);
  const trendLabel = total < 6 ? 'Not enough guesses yet for a trend'
    : trendDelta > 5 ? `Trending up <i class="ph">&#xE08E;</i> (+${trendDelta} pts)`
    : trendDelta < -5 ? `Trending down <i class="ph">&#xE03E;</i> (${trendDelta} pts)`
    : 'Holding steady <i class="ph">&#xE06C;</i>';

  const W = 600, H = 120, pad = 10;
  const points = rolling.map((v,i)=>{
    const x = pad + (rolling.length>1 ? (i/(rolling.length-1)) : 0) * (W-2*pad);
    const y = H - pad - (v/100)*(H-2*pad);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');

  // Same four categories as the Live Scope filters, in the same fixed order/colors —
  // always shown even at 0 guesses so the columns don't jump around as you play.
  const CAT_ORDER = ['ga','rotor','charter','commercial'];
  const CAT_LABEL = {ga:'GA', rotor:'Rotor', charter:'Charter', commercial:'Commercial'};
  const catStats = {};
  CAT_ORDER.forEach(c=>{ catStats[c] = {sum:0, count:0}; });
  log.forEach(e=>{
    if(catStats[e.category]){ catStats[e.category].sum += e.score; catStats[e.category].count++; }
  });

  const makes = {};
  log.forEach(e=>{
    const m = e.correctMake || 'Unknown';
    if(!makes[m]) makes[m] = {sum:0,count:0};
    makes[m].sum += e.score; makes[m].count++;
  });
  const makeRows = Object.entries(makes)
    .map(([m,d])=>({label:m, acc: Math.round(d.sum/d.count), count:d.count}))
    .sort((x,y)=>x.acc-y.acc);

  const barRow = r => `
    <div class="dash-bar-row">
      <div class="dash-bar-label">${r.label} <span class="dash-bar-count">(${r.count})</span></div>
      <div class="dash-bar-track"><div class="dash-bar-fill" style="width:${r.acc}%;background:${scoreColor(r.acc)};"></div></div>
      <div class="dash-bar-pct" style="color:${scoreColor(r.acc)};">${r.acc}%</div>
    </div>`;


  dashEl.innerHTML = `
    <div class="dash-stats-primary">
      <div class="dash-stat-lg"><b>${total}</b><span>Guesses</span></div>
      <div class="dash-stat-lg"><b>${avg}%</b><span>Avg score</span></div>
    </div>
    <div class="dash-stats">
      <div class="dash-stat" style="color:var(--phosphor);"><b>${perfect}</b><span>Exact IDs</span></div>
      <div class="dash-stat" style="color:var(--amber);"><b>${partial}</b><span>Make-only</span></div>
      <div class="dash-stat" style="color:var(--magenta);"><b>${missed}</b><span>Missed</span></div>
    </div>

    <div class="dash-section">
      <h4>Accuracy trend <span class="dash-trend-label">${trendLabel}</span></h4>
      <svg viewBox="0 0 ${W} ${H}" class="dash-trend-svg" preserveAspectRatio="none">
        <line x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}" stroke="#20392c" stroke-width="1"/>
        <line x1="${pad}" y1="${H/2}" x2="${W-pad}" y2="${H/2}" stroke="#20392c" stroke-width="1" stroke-dasharray="2,4"/>
        <polyline points="${points}" fill="none" stroke="#8fe3a6" stroke-width="2"/>
      </svg>
      <div class="dash-trend-caption">Rolling average over your last ${windowSize} guesses at each point in your history, oldest to most recent.</div>
    </div>

    <div class="dash-section">
      <h4>By category</h4>
      <div class="dash-cat-grid">
        ${CAT_ORDER.map(c=>{
          const d = catStats[c];
          const pct = d.count ? Math.round(d.sum/d.count) : null;
          const color = CATEGORY_COLORS[c];
          return `<div class="dash-cat-col">
            <div class="dash-cat-name" style="color:${color};">${CAT_LABEL[c]}</div>
            <div class="dash-cat-pct" style="color:${color};">${pct===null?'—':pct+'%'}</div>
            <div class="dash-cat-count">${d.count} guess${d.count===1?'':'es'}</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="dash-section">
      <h4>By manufacturer <span class="dash-trend-label">weakest first</span></h4>
      ${makeRows.map(barRow).join('')}
    </div>
  `;
}

async function exportCollection(){
  const r = await storage.list('bird:');
  const keys = r ? r.keys : [];
  const birds = [];
  for(const k of keys){
    try{ const rr = await storage.get(k); if(rr) birds.push(JSON.parse(rr.value)); }catch(e){}
  }
  const payload = {
    exported_at: new Date().toISOString(),
    source:'Hudson Corridor Watch',
    count: birds.length,
    birds,
    typeOverrides: Object.keys(typeOverrides).length ? typeOverrides : undefined,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `AeroDex-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function importCollection(file){
  const statusEl = document.getElementById('importStatus');
  let payload;
  try{
    payload = JSON.parse(await file.text());
  }catch(e){
    statusEl.textContent = "Couldn't read that file — not valid JSON.";
    return;
  }
  const birds = Array.isArray(payload) ? payload : (payload.birds || []);
  if(!birds.length){
    statusEl.textContent = 'No records found in that file.';
    return;
  }
  let count = 0;
  for(const rec of birds){
    if(!rec || !rec.hex) continue;
    const key = 'bird:'+rec.hex;
    let existing = null;
    try{ const r = await storage.get(key); existing = r ? JSON.parse(r.value) : null; }catch(e){}
    // Merge rather than overwrite: keep earliest first_seen, latest last_seen, and the
    // higher sighting count (max, not sum — re-importing the same backup shouldn't inflate counts).
    const merged = existing ? {
      hex: rec.hex,
      reg: existing.reg || rec.reg || null,
      type: existing.type || rec.type || null,
      category: existing.category || rec.category || null,
      first_seen: new Date(existing.first_seen) < new Date(rec.first_seen) ? existing.first_seen : rec.first_seen,
      last_seen: new Date(existing.last_seen) > new Date(rec.last_seen) ? existing.last_seen : rec.last_seen,
      count: Math.max(existing.count||1, rec.count||1)
    } : rec;
    try{ await storage.set(key, JSON.stringify(merged)); count++; }catch(e){}
  }

  let overrideCount = 0;
  if(payload.typeOverrides && typeof payload.typeOverrides === 'object'){
    for(const [code, ov] of Object.entries(payload.typeOverrides)){
      if(!typeOverrides[code]){ typeOverrides[code] = ov; overrideCount++; } // don't clobber a local correction with an older imported one
    }
    if(overrideCount){
      try{ await storage.set('typeOverrides', JSON.stringify(typeOverrides)); }catch(e){}
    }
  }

  statusEl.textContent = `Imported ${count} record${count===1?'':'s'}${overrideCount?`, ${overrideCount} classification correction${overrideCount===1?'':'s'}`:''}.`;
  renderLog();
  renderMap();
  renderTable();
  renderDashboard();
}

// ============ HARD MODE ============
// The phone can't actually receive ADS-B (that needs dedicated SDR hardware, which is
// how airplanes.live's own ground stations work) — so "prove you're looking at it" is
// built from what a phone actually has: GPS position (already tracked via CENTER) plus
// compass heading + tilt. We already know the aircraft's real lat/lon/altitude from the
// feed, so we can compute the exact bearing/elevation you'd need to be facing to see it,
// and compare that against the device's live orientation.
let hardModeActive = false;
let deviceHeading = null; // compass heading, degrees, 0=N clockwise
let deviceTilt = null;    // beta: front-back tilt, ~90=vertical/facing horizon, ~0=flat/facing sky
let hardModeGateHex = null; // hex of the aircraft currently shown in the aim gate, for live updates
const hardModeAimedHexes = new Set(); // hexes already verified this session — don't re-gate on reopen
const hardModePhotos = new Map(); // hex -> data URL, captured this session only (not persisted to storage)

const AIM_AZ_TOLERANCE = 10; // degrees
const AIM_EL_TOLERANCE = 10; // degrees

function deviceElevation(){
  if(deviceTilt === null) return null;
  // beta=0: flat, camera faces straight down (elevation -90). beta=90: phone upright,
  // camera faces the horizon (elevation 0). beta=180: flipped flat, camera faces
  // straight up (elevation +90). So elevation = beta - 90, not the other way around.
  return deviceTilt - 90;
}

function computeTargetAim(a){
  const brg = bearing(CENTER.lat, CENTER.lon, a.lat, a.lon);
  const distFt = haversineDist(CENTER.lat, CENTER.lon, a.lat, a.lon) * 6076.12;
  const altFt = typeof a.alt_baro === 'number' ? a.alt_baro : 0;
  const elevation = distFt > 0 ? Math.atan2(altFt, distFt) * 180/Math.PI : 90;
  return {bearing: brg, elevation: Math.max(0, Math.min(90, elevation))};
}

function isAligned(target){
  if(deviceHeading === null) return false;
  let azDiff = Math.abs(deviceHeading - target.bearing);
  if(azDiff > 180) azDiff = 360 - azDiff;
  const elev = deviceElevation();
  const elDiff = elev === null ? 999 : Math.abs(elev - target.elevation);
  return azDiff <= AIM_AZ_TOLERANCE && elDiff <= AIM_EL_TOLERANCE;
}

function handleOrientation(e){
  if(typeof e.webkitCompassHeading === 'number' && !isNaN(e.webkitCompassHeading)){
    deviceHeading = e.webkitCompassHeading; // iOS: already a true compass heading
  } else if(typeof e.alpha === 'number'){
    deviceHeading = (360 - e.alpha) % 360; // Android absolute orientation approximation
  }
  if(typeof e.beta === 'number') deviceTilt = e.beta;
  if(hardModeGateHex) updateAimGate();
}

function startOrientationListening(){
  if('ondeviceorientationabsolute' in window){
    window.addEventListener('deviceorientationabsolute', handleOrientation);
  } else {
    window.addEventListener('deviceorientation', handleOrientation);
  }
}
function stopOrientationListening(){
  window.removeEventListener('deviceorientationabsolute', handleOrientation);
  window.removeEventListener('deviceorientation', handleOrientation);
}

function updateAimGate(){
  const statusEl = document.getElementById('aimStatus');
  const btn = document.getElementById('aimIdentifyBtn');
  const wrapEl = document.getElementById('aimViewfinderWrap');
  if(!statusEl || !btn) return; // gate isn't showing anymore
  const a = currentAircraft.find(x=>x.hex===hardModeGateHex);
  if(!a) return;

  // Recompute against the aircraft's CURRENT position every time — it moves fast in
  // 3D, so a target locked to where it was when the gate opened goes stale within
  // seconds. This also updates the on-screen bearing/elevation numbers themselves,
  // not just the internal alignment check, so what you see always matches what's live.
  const target = computeTargetAim(a);
  const bearingEl = document.getElementById('aimTargetBearing');
  const elevationEl = document.getElementById('aimTargetElevation');
  if(bearingEl) bearingEl.textContent = `${Math.round(target.bearing)}°`;
  if(elevationEl) elevationEl.textContent = `${Math.round(target.elevation)}°`;

  if(deviceHeading === null){
    statusEl.textContent = 'Requesting compass…';
    statusEl.className = 'aim-status unaligned';
    if(wrapEl) wrapEl.classList.remove('aligned');
    return;
  }
  const aligned = isAligned(target);
  btn.disabled = !aligned;
  if(wrapEl) wrapEl.classList.toggle('aligned', aligned);
  if(aligned){
    statusEl.textContent = 'Aligned — you found it!';
    statusEl.className = 'aim-status aligned';
    return;
  }
  let azDiff = deviceHeading - target.bearing;
  azDiff = ((azDiff + 180) % 360 + 360) % 360 - 180;
  const azOk = Math.abs(azDiff) <= AIM_AZ_TOLERANCE;
  if(!azOk){
    statusEl.textContent = `Turn ${Math.abs(Math.round(azDiff))}° ${azDiff > 0 ? 'left' : 'right'}`;
  } else {
    const elev = deviceElevation();
    const elDiff = elev === null ? null : elev - target.elevation;
    statusEl.textContent = elDiff === null ? 'Tilt your phone to find it'
      : elDiff > 0 ? `Point ${Math.round(Math.abs(elDiff))}° lower`
      : `Point ${Math.round(Math.abs(elDiff))}° higher`;
  }
  statusEl.className = 'aim-status unaligned';
}

let hardModeStream = null;

async function startAimCamera(videoEl){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {facingMode: {ideal:'environment'}},
      audio: false
    });
    hardModeStream = stream;
    videoEl.srcObject = stream;
    await videoEl.play();
    applyMaxZoom(stream);
    return true;
  }catch(e){
    console.error('Live camera unavailable, falling back to native camera capture:', e);
    return false;
  }
}

// Zooms the camera to its maximum supported level, since aircraft are small and far away
// at any normal field of view. This is genuinely best-effort — the MediaTrackConstraints
// zoom property only has real support on some Chrome/Android combinations; iOS Safari
// currently exposes no way to control zoom through the web API at all, so on iOS (and any
// unsupported browser) this silently does nothing rather than failing the whole capture.
async function applyMaxZoom(stream){
  try{
    const track = stream.getVideoTracks()[0];
    if(!track || typeof track.getCapabilities !== 'function') return;
    const caps = track.getCapabilities();
    if(caps && caps.zoom && typeof caps.zoom.max === 'number'){
      await track.applyConstraints({advanced: [{zoom: caps.zoom.max}]});
    }
  }catch(e){
    console.error('Max zoom not supported on this device/browser:', e);
  }
}

function stopAimCamera(){
  if(hardModeStream){
    hardModeStream.getTracks().forEach(t=>t.stop());
    hardModeStream = null;
  }
  const detailEl = document.getElementById('detail');
  if(detailEl) detailEl.classList.remove('camera-active');
}

function capturePhotoFromVideo(videoEl){
  const canvas = document.createElement('canvas');
  canvas.width = videoEl.videoWidth || 640;
  canvas.height = videoEl.videoHeight || 480;
  canvas.getContext('2d').drawImage(videoEl, 0, 0, canvas.width, canvas.height);
  return canvas.toDataURL('image/jpeg', 0.85);
}

async function renderAimGate(hex, a){
  stopAimCamera(); // guard against a leftover stream if this gets re-rendered
  hardModeGateHex = hex;
  const quizEl = document.getElementById('quizArea');
  const target = computeTargetAim(a);
  quizEl.innerHTML = `
    <div class="aim-gate" id="aimGate">
      <div class="aim-viewfinder-wrap" id="aimViewfinderWrap">
        <video id="aimVideo" class="aim-viewfinder" autoplay muted playsinline></video>
        <div class="aim-reticle"></div>
        <div class="aim-overlay-top"><i class="ph">&#xEA64;</i> Point your phone at it</div>
        <div class="aim-overlay-bottom">
          <div class="aim-readout">
            <div><span class="aim-label">Target bearing</span><span class="aim-value" id="aimTargetBearing">${Math.round(target.bearing)}°</span></div>
            <div><span class="aim-label">Target elevation</span><span class="aim-value" id="aimTargetElevation">${Math.round(target.elevation)}°</span></div>
          </div>
          <div class="aim-status unaligned" id="aimStatus">Requesting compass…</div>
        </div>
      </div>
      <button class="geo-btn aim-identify-btn" id="aimIdentifyBtn" disabled><i class="ph">&#xE10E;</i> Take Photo &amp; Identify</button>
    </div>`;
  updateAimGate();

  const videoEl = document.getElementById('aimVideo');
  const cameraOk = await startAimCamera(videoEl);
  if(hardModeGateHex !== hex) { stopAimCamera(); return; } // gate moved on while camera was still starting up
  if(cameraOk){
    document.getElementById('detail').classList.add('camera-active');
  } else {
    videoEl.style.display = 'none'; // no live feed, but alignment still works fine without it
  }

  document.getElementById('aimIdentifyBtn').addEventListener('click', ()=>{
    if(cameraOk){
      hardModePhotos.set(hex, capturePhotoFromVideo(videoEl));
      stopAimCamera();
      proceedPastAimGate(hex);
      return;
    }
    // Fallback: no live viewfinder available, so hand off to the OS camera app instead.
    const fileInput = document.getElementById('aimPhotoInput');
    fileInput.onchange = ()=>{
      const file = fileInput.files[0];
      fileInput.value = '';
      if(file){
        const reader = new FileReader();
        reader.onload = ()=>{ hardModePhotos.set(hex, reader.result); proceedPastAimGate(hex); };
        reader.onerror = ()=> proceedPastAimGate(hex);
        reader.readAsDataURL(file);
      } else {
        proceedPastAimGate(hex); // camera cancelled — still proceed, alignment was already verified
      }
    };
    fileInput.click();
  });
}

function proceedPastAimGate(hex){
  stopAimCamera();
  hardModeAimedHexes.add(hex);
  hardModeGateHex = null;
  showDetail(hex);
}

// Photo hints: a deliberate practice mode, not a game-breaking spoiler — lets you see
// a picture before guessing, useful indoors or when the plane's too far/obscured to
// actually see, so you can still practice identification by photo rather than needing
// eyes-on. Overrides the normal reveal-gate in showDetail() while active.
let photoHintsEnabled = false;
document.getElementById('photoHintsBtn').addEventListener('click', ()=>{
  photoHintsEnabled = !photoHintsEnabled;
  document.getElementById('photoHintsBtn').classList.toggle('on', photoHintsEnabled);
  if(selectedHex) showDetail(selectedHex); // refresh whatever's currently open right away
});

document.getElementById('hardModeBtn').addEventListener('click', async ()=>{
  const btn = document.getElementById('hardModeBtn');
  if(!hardModeActive){
    try{
      let permission = 'granted';
      if(typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function'){
        permission = await DeviceOrientationEvent.requestPermission();
      }
      if(permission !== 'granted'){
        alert('Hard Mode needs motion & orientation access — check your browser/site settings and try again.');
        return;
      }
    }catch(e){
      alert('Could not enable Hard Mode: ' + e.message);
      return;
    }
    startOrientationListening();
    hardModeActive = true;
    btn.classList.add('on');
    document.querySelector('.scope-wrap').classList.add('hard-mode-active');
    refreshHardModeLocation();
  } else {
    stopOrientationListening();
    stopAimCamera();
    hardModeActive = false;
    deviceHeading = null;
    deviceTilt = null;
    btn.classList.remove('on');
    document.querySelector('.scope-wrap').classList.remove('hard-mode-active');
  }
});

// One-shot location fix (not continuous tracking like the GPS button) — called once when
// Hard Mode is turned on, and again every time the tab/screen becomes visible again. If
// you're walking around with the phone locked, this re-centers the map on you the moment
// you unlock and look at it, without needing continuous watchPosition running the whole time.
function refreshHardModeLocation(){
  if(!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos=>{
    CENTER.lat = pos.coords.latitude;
    CENTER.lon = pos.coords.longitude;
    updateCenterVisuals();
    renderTable();
    renderMap();
    if(map) map.setView([CENTER.lat, CENTER.lon], map.getZoom());
    const acc = pos.coords.accuracy ? Math.round(pos.coords.accuracy) : null;
    const stamp = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    document.getElementById('geoAccuracy').textContent = acc ? `±${acc}m · ${stamp}` : stamp;
  }, err=>{
    console.error('Hard Mode location fix failed:', err);
  }, {enableHighAccuracy:true, maximumAge:5000, timeout:15000});
}

document.addEventListener('visibilitychange', ()=>{
  if(hardModeActive && document.visibilityState === 'visible'){
    refreshHardModeLocation();
  }
});

let geoWatchId = null;

function startGeoTracking(){
  const btn = document.getElementById('geoBtn');
  if(!navigator.geolocation){
    btn.title = 'Geolocation not supported here.';
    return;
  }
  btn.classList.add('on');
  btn.title = 'Tracking — tap to stop';
  let firstFix = true;

  geoWatchId = navigator.geolocation.watchPosition(pos=>{
    CENTER.lat = pos.coords.latitude;
    CENTER.lon = pos.coords.longitude;
    updateCenterVisuals();
    renderTable(); // distance/bearing columns are relative to CENTER
    renderMap();
    const acc = pos.coords.accuracy ? Math.round(pos.coords.accuracy) : null;
    document.getElementById('geoAccuracy').textContent = acc ? `±${acc}m · LIVE` : 'LIVE';
    btn.title = 'Tracking — tap to stop';
    if(firstFix){
      map.setView([CENTER.lat, CENTER.lon], map.getZoom());
      firstFix = false;
    }
  }, err=>{
    let msg = 'Location unavailable.';
    if(err.code === err.PERMISSION_DENIED) msg = 'Location permission denied — check browser/site settings.';
    else if(err.code === err.TIMEOUT) msg = 'Location request timed out, still trying…';
    btn.title = msg;
    document.getElementById('geoAccuracy').textContent = '';
  }, {enableHighAccuracy:true, maximumAge:5000, timeout:15000});
}

function stopGeoTracking(){
  if(geoWatchId !== null){ navigator.geolocation.clearWatch(geoWatchId); geoWatchId = null; }
  const btn = document.getElementById('geoBtn');
  btn.classList.remove('on');
  btn.title = 'Use my location';
  document.getElementById('geoAccuracy').textContent = '';
}

document.getElementById('geoBtn').addEventListener('click', ()=>{
  if(geoWatchId === null) startGeoTracking(); else stopGeoTracking();
});

loadGameScore();
loadTypeOverrides();
renderDashboard();
renderLog();
loadLiveRarityData();
initMap();
poll();
setInterval(poll, 2000);
</script>
